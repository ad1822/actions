name: Frontend-backend pipeline

on: 
  push: 
    branches: 
      dev


jobs:
  Frontend_Build_Image:
    runs-on: ubuntu-24.04
    # defaults:
    #   run:
    #     working-directory: ./frontend
    outputs:
      github-sha: ${{ steps.github-sha.outputs.github-sha }}
    environment: production

    steps:
      - name: Checkout code
        uses: "actions/checkout@v4"

      - name: Generate a SHA for Docker tag
        id: github-sha
        run: echo "github-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login in Docker
        uses: "docker/login-action@v3"
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Build docker image"
        uses: "docker/setup-buildx-action@v3"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ vars.FRONTEND_IMAGE_NAME }}:${{ steps.github-sha.outputs.github-sha }}

  Backend_Build_Image:
    runs-on: ubuntu-24.04
    # defaults:
    #   run:
    #     working-directory: ./backend
    needs: Frontend_Build_Image
    env:
      github-sha: ${{ needs.Frontend_Build_Image.outputs.github-sha }}
    environment: production

    steps:
      - name: Checkout code
        uses: "actions/checkout@v4"

      - name: Login in Docker
        uses: "docker/login-action@v3"
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Build docker image"
        uses: "docker/setup-buildx-action@v3"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ vars.BACKEND_IMAGE_NAME }}:${{ env.github-sha }}

  
  Deploy:
    runs-on: ubuntu-24.04
    environment: production
    needs:
      - Frontend_Build_Image
      - Backend_Build_Image
    env:
      github-sha: ${{ needs.Frontend_Build_Image.outputs.github-sha }}

    steps:
    - name: Clone the repo
      uses: "actions/checkout@v4"


    - name: Copy compose.yaml to server
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.PRIVATE_SSH_KEY }}
        port: 22
        source: 'compose.yaml'    # must exist in repo root
        target: '/home/ubuntu'

    - name: Update new Compose file
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.PRIVATE_SSH_KEY }}
        port: 22
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/product-frontend:${{ env.github-sha }}
          docker pull ${{ secrets.DOCKER_USERNAME }}/product-backend:${{ env.github-sha }}
    
          sed -i "s|product-frontend:latest|${{ secrets.DOCKER_USERNAME }}/product-frontend:${{ env.github-sha }}|g" ~/compose.yaml
          sed -i "s|product-backend:latest|${{ secrets.DOCKER_USERNAME }}/product-backend:${{ env.github-sha }}|g" ~/compose.yaml
    
    - name: Update new Compose file
      uses: "appleboy/ssh-action@v1"
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.PRIVATE_SSH_KEY }}
        port: 22
        script: |
          cat <<EOF > .env
            PORT=${{ secrets.PORT }}
    
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
    
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
    
            HOST=${{ secrets.HOST }}
            EOF

          docker pull product-frontend:latest
          docker pull product-backend:latest
    
          docker-compose down
          docker-compose up -d
