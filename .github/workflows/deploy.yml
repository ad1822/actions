name: Frontend-backend pipeline

on: 
  # workflow_dispatch: 
  #   inputs:
  #     environment:
  #       description: "select an environment to run"
  #       type: environment
  #       default: "dev"

  pull_request: 
    branches: [main]
  push: 
    branches: [dev, main]

concurrency: 
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ vars.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ vars.BACKEND_IMAGE_NAME }}:${{ github.sha }}
  FRONTEND_IMAGE_LATEST: ${{ secrets.DOCKER_USERNAME }}/${{ vars.FRONTEND_IMAGE_NAME }}:latest
  BACKEND_IMAGE_LATEST: ${{ secrets.DOCKER_USERNAME }}/${{ vars.BACKEND_IMAGE_NAME }}:latest

jobs:

  frontend-build-test:
    runs-on: ubuntu-24.04
    name: "Frontend: Build and Test"
    # if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' }}
    defaults:
      run:
        working-directory: ./frontend

    # strategy:
    #   matrix:
    #     node: [22,24]

    steps:
        
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # node-version: ${{ matrix.node }}
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Run npm security audit
        run: npm audit > frontend-audit || true

      - name: Upload security audit report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-${{ github.sha }}
          path: ./frontend/frontend-audit
          retention-days: 7
          if-no-files-found: warn

      - name: Install npm dependencies
        run: npm ci --loglevel verbose

      - name: Run linter
        run: npm run lint || true

      # CI should NOT depend on production URL
      - name: Create environment file
        run: |
          echo "VITE_BASE_URL=http://localhost:8080" > .env

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: ./frontend/dist
          retention-days: 5
          if-no-files-found: error
          compression-level: 6

      - name: Run unit tests
        run: npm run test || true

  frontend-lint:
    runs-on: ubuntu-24.04
    name: "Frontend: Lint"
    defaults:
      run:
        working-directory: ./frontend

    steps:
        
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # node-version: ${{ matrix.node }}
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci --loglevel verbose

      - name: Run linter
        run: npm run lint || true

  backend-build-test:
    runs-on: ubuntu-24.04
    name: "Backend: Build and Test"
    # if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' }}
    defaults:
      run:
        working-directory: ./backend

    # strategy:
    #   matrix:
    #     node: [22,24]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Run npm security audit
        run: npm audit > backend-audit || true

      - name: Upload security audit report
        uses: actions/upload-artifact@v4
        with:
          name: backend-audit-${{ github.sha }}
          path: ./backend/backend-audit
          retention-days: 7
          if-no-files-found: warn

      - name: Install npm dependencies
        run: npm ci --loglevel verbose

      - name: Run linter
        run: npm run lint || true

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm run test || true


  backend-lint:
    runs-on: ubuntu-24.04
    name: "Backend: Lint"
    # if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' }}
    defaults:
      run:
        working-directory: ./backend

    # strategy:
    #   matrix:
    #     node: [22,24]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install npm dependencies
        run: npm ci --loglevel verbose

      - name: Run linter
        run: npm run lint || true

  frontend-build-image:
    runs-on: ubuntu-24.04
    name: "Frontend: Build Docker Image"
    needs: [frontend-build-test, frontend-lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: ${{ env.FRONTEND_IMAGE }}
          build-args: |
            VITE_CLOUDINARY_CLOUD_NAME=${{ vars.VITE_CLOUDINARY_CLOUD_NAME }}
            VITE_CLOUDINARY_UPLOAD_PRESET=${{ vars.VITE_CLOUDINARY_UPLOAD_PRESET }}
          #   VITE_BASE_URL=${{ github.ref == 'refs/heads/main' && format('http://{0}:{1}', secrets.HOST, secrets.PORT) || 'http://backend:8080' }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Tag image as latest
        run: |
          docker tag ${{ env.FRONTEND_IMAGE }} ${{ env.FRONTEND_IMAGE_LATEST }}

      - name: Push Docker image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}
          docker push ${{ env.FRONTEND_IMAGE_LATEST }}

  backend-build-image:
    runs-on: ubuntu-24.04
    name: "Backend: Build Docker Image"
    needs: [backend-build-test, backend-lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Tag image as latest
        run: |
          docker tag ${{ env.BACKEND_IMAGE }} ${{ env.BACKEND_IMAGE_LATEST }}

      - name: Push Docker image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}
          docker push ${{ env.BACKEND_IMAGE_LATEST }}
         
  
  integration-test:
    runs-on: ubuntu-24.04
    name: "Integration Test"
    needs: [frontend-build-test, backend-build-image]
    if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' || github.event_name == 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate environment file
        run: |
          cat <<EOF > .env
          PORT=8080
          DB_HOST=database
          DB_PORT=5432
          DB_NAME=admindb
          DB_USER=root
          DB_PASSWORD=admin123
          VITE_BASE_URL=http://backend:8080
          HOST=localhost
          EOF

      - name: Pull backend Docker image
        run: |
          # docker pull ${{ env.FRONTEND_IMAGE }}
          docker pull ${{ env.BACKEND_IMAGE }}

      - name: Start Docker Compose services
        run: docker compose up -d
        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}

      - name: Wait for backend health check
        run: |
          for i in {1..20}; do
            if curl -f http://localhost:8080/health; then
              echo "Backend is up"
              exit 0
            fi
            sleep 3
          done
          
          echo "Backend failed to start"
          docker logs $(docker ps -q)
          exit 1

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: ./frontend/dist

      - name: Run integration tests
        run: |
          cd frontend
          npm ci 
          npm run test:integration
        env:
          VITE_BASE_URL: http://localhost:8080   

      - name: Cleanup Docker Compose services
        run: docker compose down

  deploy:
    runs-on: ubuntu-24.04
    name: "Deploy to Production"
    environment: production
    if: ${{ github.ref == 'refs/heads/main' }}
    needs:
      - integration-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Docker Compose file to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          source: 'compose.yaml'
          target: '/home/ubuntu'

      - name: Deploy application via SSH
        uses: "appleboy/ssh-action@v1"
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          script: |
            cat <<EOF > .env
            PORT=${{ secrets.PORT }}

            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            VITE_BASE_URL=http://${{ secrets.HOST }}:${{ secrets.PORT }}

            EOF
              

              docker pull ${{ env.FRONTEND_IMAGE }}
              docker pull ${{ env.BACKEND_IMAGE }}

              docker compose --env-file .env down
              docker compose --env-file .env up -d --remove-orphans

  smoke-test:
    runs-on: ubuntu-24.04
    name: "Smoke Test"
    environment: production
    needs: deploy

    steps:
      - name: Ping production host
        run: ping ${{ secrets.HOST }} -c 10 || true
      - name: Verify application on port
        run: curl http://${{ secrets.HOST }}:${{ secrets.PORT }}
      - name: Verify application on default port
        run: curl http://${{ secrets.HOST }}
