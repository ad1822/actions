name: Frontend-backend pipeline

on: 
  # workflow_dispatch: 
  #   inputs:
  #     environment:
  #       description: "select an environment to run"
  #       type: environment
  #       default: "dev"

  pull_request: 
    branches: [main]
  push: 
    branches: [dev, main]

    # paths: 
    #   - 'backend/**'
    #   - 'frontend/**'

concurrency: 
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ vars.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ vars.BACKEND_IMAGE_NAME }}:${{ github.sha }}
  FRONTEND_IMAGE_LATEST: ${{ secrets.DOCKER_USERNAME }}/${{ vars.FRONTEND_IMAGE_NAME }}:latest
  BACKEND_IMAGE_LATEST: ${{ secrets.DOCKER_USERNAME }}/${{ vars.BACKEND_IMAGE_NAME }}:latest

jobs:

  Frontend_Build_Test:
    runs-on: ubuntu-24.04
    environment: development
    if: ${{ github.ref == 'refs/heads/dev' }}
    defaults:
      run:
        working-directory: ./frontend

    strategy:
      matrix:
        node: [22,24]

    steps:
      - name: Clone the frontend repo 
        uses: "actions/checkout@v4"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Dependencies scanning
        run: "npm audit > frontend-audit || true"

      - name: Upload test results
        uses: "actions/upload-artifact@v7"
        with:
          path: ./frontend/frontend-audit
          name: "frontend-audit-${{ matrix.node }}-${{ github.sha }}"

      - name: Install the dependencies
        id: install
        run: "npm ci --loglevel verbose"

      - name: Checking linting
        run: "npm run lint || true"

      - name: Make .env
        run: |
          cat <<EOF > .env
          VITE_BASE_URL=http://${{ secrets.HOST }}:${{ secrets.PORT }}
          EOF

      - name: Build the code
        run: "npm run build"

      - name: Run Unit Testing
        run: "npm run test || true"

  Backend_Build_Test:
    runs-on: ubuntu-24.04
    environment: development
    defaults:
      run:
        working-directory: ./backend

    strategy:
      matrix:
        node: [22,24]

    steps:
      - name: Clone the repo 
        uses: "actions/checkout@v4"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Dependencies scanning
        run: "npm audit > backend-audit || true"

      - name: Upload test results
        uses: "actions/upload-artifact@v7"
        with:
          path: ./backend/backend-audit
          name: "backend-audit-${{ matrix.node }}-${{ github.sha }}"

      - name: Install the dependencies
        run: "npm ci --loglevel verbose"

      - name: Checking linting
        run: "npm run lint || true"

      - name: Build the code
        run: "npm run build"

      - name: Run Unit Testing
        run: "npm run test || true"

  Frontend_Build_Image:
    runs-on: ubuntu-24.04
    needs: Frontend_Build_Test

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: "actions/checkout@v4"

      - name: Login in Docker
        uses: "docker/login-action@v3"
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Build docker image"
        uses: "docker/setup-buildx-action@v3"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE_LATEST }} 
          build-args: |
            VITE_BASE_URL=http://backend:8080

  Backend_Build_Image:
    runs-on: ubuntu-24.04
    environment: development
    needs: Backend_Build_Test

    steps:
      - name: Checkout code
        uses: "actions/checkout@v4"

      - name: Login in Docker
        uses: "docker/login-action@v3"
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Build docker image"
        uses: "docker/setup-buildx-action@v3"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.BACKEND_IMAGE_LATEST }} 

  Run_Integration_Test:
    runs-on: ubuntu-22.04
    needs: [ Frontend_Build_Image, Backend_Build_Image]
    if: ${{ github.ref == 'refs/heads/dev' }}
    environment: development

    steps:
      - name: Clone the repo
        uses: "actions/checkout@v4"

      - name: Create .env
        run: |
          cat <<EOF > .env
          PORT=8080

          DB_HOST=database
          DB_PORT=5432
          DB_NAME=admindb
          DB_USER=root
          DB_PASSWORD=admin123

          VITE_BASE_URL=http://backend:8080

          HOST=localhost
          EOF

      - name: Pull images
        run: |
          docker pull ${{ env.FRONTEND_IMAGE }}
          docker pull ${{ env.BACKEND_IMAGE }}

      - name: Start docker compose
        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
        run: docker compose up -d

      - name: Wait for backend to up
        run: |
          for i in {1..20}; do
            curl http://localhost:8080/health && break
            sleep 3
          done

      - name: Run frontend integration test
        run: |
          cd frontend
          npm ci 
          npm run test:integration
            
      - name: Cleanup
        run: docker compose down
  
  Deploy:
    runs-on: ubuntu-24.04
    environment: production
    needs:
      - Frontend_Build_Image
      - Backend_Build_Image

    steps:
    - name: Clone the repo
      uses: "actions/checkout@v4"

    - name: Copy compose.yaml to server
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.PRIVATE_SSH_KEY }}
        port: 22
        source: 'compose.yaml'
        target: '/home/ubuntu'

  Smoke_Testing:
    runs-on: ubuntu-24.04
    environment: production
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: Deploy

    steps:
      - name: Check system is up
        run: ping ${{ secrets.HOST }} -c 10 || true

      - name: Check backend API
        run: curl http://${{ secrets.HOST }}:${{ secrets.PORT }}

      - name: Check frontend API
        run: curl http://${{ secrets.HOST }}
