name: Frontend-backend pipeline

on: 
  # workflow_dispatch: 
  #   inputs:
  #     environment:
  #       description: "select an environment to run"
  #       type: environment
  #       default: "dev"

  pull_request: 
    branches: [main]
  push: 
    branches: [dev, main]

concurrency: 
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ vars.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ vars.BACKEND_IMAGE_NAME }}:${{ github.sha }}
  FRONTEND_IMAGE_LATEST: ${{ secrets.DOCKER_USERNAME }}/${{ vars.FRONTEND_IMAGE_NAME }}:latest
  BACKEND_IMAGE_LATEST: ${{ secrets.DOCKER_USERNAME }}/${{ vars.BACKEND_IMAGE_NAME }}:latest

jobs:

  Frontend_Build_Test:
    runs-on: ubuntu-24.04
    if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' }}
    defaults:
      run:
        working-directory: ./frontend

    strategy:
      matrix:
        node: [22,24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - run: npm audit > frontend-audit || true

      - uses: actions/upload-artifact@v7
        with:
          path: ./frontend/frontend-audit
          name: frontend-audit-${{ matrix.node }}-${{ github.sha }}

      - run: npm ci --loglevel verbose
      - run: npm run lint || true

      # CI should NOT depend on production URL
      - run: |
          echo "VITE_BASE_URL=http://localhost:8080" > .env

      - run: npm run build
      - run: npm run test || true

  Backend_Build_Test:
    runs-on: ubuntu-24.04
    if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' }}
    defaults:
      run:
        working-directory: ./backend

    strategy:
      matrix:
        node: [22,24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - run: npm audit > backend-audit || true

      - uses: actions/upload-artifact@v7
        with:
          path: ./backend/backend-audit
          name: backend-audit-${{ matrix.node }}-${{ github.sha }}

      - run: npm ci --loglevel verbose
      - run: npm run lint || true
      - run: npm run build
      - run: npm run test || true

  Frontend_Build_Image:
    runs-on: ubuntu-24.04
    needs: Frontend_Build_Test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE_LATEST }}
          build-args: |
            VITE_BASE_URL=http://localhost:8080

  Backend_Build_Image:
    runs-on: ubuntu-24.04
    needs: Backend_Build_Test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.BACKEND_IMAGE_LATEST }}

  Run_Integration_Test:
    runs-on: ubuntu-22.04
    needs: [Frontend_Build_Image, Backend_Build_Image]
    if: ${{ github.ref == 'refs/heads/dev' }}

    steps:
      - uses: actions/checkout@v4

      - run: |
          cat <<EOF > .env
          PORT=8080
          DB_HOST=database
          DB_PORT=5432
          DB_NAME=admindb
          DB_USER=root
          DB_PASSWORD=admin123
          VITE_BASE_URL=http://backend:8080
          HOST=localhost
          EOF

      - run: |
          docker pull ${{ env.FRONTEND_IMAGE }}
          docker pull ${{ env.BACKEND_IMAGE }}

      - run: docker compose up -d
        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}

      - run: |
          for i in {1..20}; do
            curl http://localhost:8080/health && break
            sleep 3
          done

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        id: tmate
        with:
            # tmate-server-host: ssh.tmate.io
            # tmate-server-port: 22
            # tmate-server-rsa-fingerprint: SHA256:Hthk2T/M/Ivqfk1YYUn5ijC2Att3+UPzD7Rn72P5VWs
            # tmate-server-ed25519-fingerprint: SHA256:jfttvoypkHiQYUqUCwKeqd9d1fJj/ZiQlFOHVl6E9sI
            limit-access-to-actor: true

      - run: |
          cd frontend
          npm ci 
          npm run test:integration

      - run: docker compose down

  Deploy:
    runs-on: ubuntu-24.04
    environment: production
    if: ${{ github.ref == 'refs/heads/main' }}
    needs:
      - Frontend_Build_Image
      - Backend_Build_Image

    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          port: 22
          source: 'compose.yaml'
          target: '/home/ubuntu'

  Smoke_Testing:
    runs-on: ubuntu-24.04
    environment: production
    needs: Deploy

    steps:
      - run: ping ${{ secrets.HOST }} -c 10 || true
      - run: curl http://${{ secrets.HOST }}:${{ secrets.PORT }}
      - run: curl http://${{ secrets.HOST }}
