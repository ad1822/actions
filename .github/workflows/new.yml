name: cicd

on:
  push:
    branches:
      dev
  pull_request:
    branches:
      dev

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make some changes (example: create/modify a file)
        run: echo "New content" >> generated-file.txt
        # Replace this step with your actual steps that modify files (e.g., build, lint, etc.)

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated changes: update generated-file.txt" # Custom commit message
          # Optional: configure the bot's identity
          author_name: "github-actions[bot]"
          author_email: "github-actions[bot]@users.noreply.github.com"

