name: Auto Commit

on: push

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "New content" >> generated-file.txt

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated changes"
